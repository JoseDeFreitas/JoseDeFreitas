name: Test

on:
  push:
    branches: [ main ]
    paths: 'file.txt'
  pull_request:
    branches: [ main ]
    paths: 'file.txt'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up Python 3.9.1
        uses: actions/setup-python@v2
        with:
          python-version: '3.9.1'

      - name: Generate file
        run: |
          python3 --version
          python3 main.py

      - name: Commit to the repo
        run: |
          git config --global user.name "JoseDeFreitas/JoseDeFreitas"
          git config --global user.email "JoseDeFreitas@users.noreply.github.com"
          git add .
          git commit -m 'Update generated files' || echo
          git push
